services:
  db:
    image: mysql:8.0
    container_name: game_app_db
    ports:
      - "3306:3306"

    volumes:
      - dbdata:/var/lib/mysql
    restart: always
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']
    environment:
      MYSQL_ROOT_PASSWORD: gameappPassword
      MYSQL_DATABASE: gameapp_db
      MYSQL_USER: gameapp
      MYSQL_PASSWORD: gameappPassword

  game_app_redis:
    image: redis:7.2.4-alpine
    container_name: game_app_redis
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --loglevel warning --protected-mode no
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - game-app-redis-data:/data


volumes:
  dbdata:
  game-app-redis-data: